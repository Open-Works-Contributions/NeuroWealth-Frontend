name: Docs CI

on:
  push:
    branches: [ main ]
    paths:
      - '**.md'
      - '.github/**'
  pull_request:
    branches: [ main ]
    paths:
      - '**.md'
      - '.github/**'

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !node_modules

